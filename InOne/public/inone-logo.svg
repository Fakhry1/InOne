<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">INONE</title>
  <desc id="desc">INONE wordmark optimized for clear rendering at small sizes</desc>
  <defs>
    <linearGradient id="logoBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c8cff" />
      <stop offset="100%" stop-color="#173ebf" />
    </linearGradient>
    <linearGradient id="logoOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb326" />
      <stop offset="100%" stop-color="#f06b0f" />
    </linearGradient>
    <linearGradient id="logoInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#232733" />
      <stop offset="100%" stop-color="#111420" />
    </linearGradient>
  </defs>

  <g transform="translate(38,30)">
    <text
      x="0"
      y="166"
      font-size="136"
      font-family="Arial Black, Arial, sans-serif"
      font-style="italic"
      letter-spacing="1"
      fill="url(#logoBlue)"
    >IN</text>

    <g id="brand-o" transform="translate(198,2) scale(1.06)">
      <ellipse
        cx="76"
        cy="72"
        rx="52"
        ry="62"
        transform="rotate(20 76 72)"
        fill="none"
        stroke="url(#logoInk)"
        stroke-width="15"
      />
      <path
        d="M34 114 A64 76 20 0 1 24 62"
        fill="none"
        stroke="url(#logoOrange)"
        stroke-width="15"
        stroke-linecap="round"
      />
      <path
        d="M120 32 A64 76 20 0 1 127 90"
        fill="none"
        stroke="url(#logoBlue)"
        stroke-width="15"
        stroke-linecap="round"
      />
      <ellipse cx="76" cy="72" rx="28" ry="42" transform="rotate(20 76 72)" fill="#f3f4f6" />
    </g>

    <text
      x="352"
      y="166"
      font-size="136"
      font-family="Arial Black, Arial, sans-serif"
      font-style="italic"
      letter-spacing="1"
      fill="url(#logoInk)"
    >NE</text>
  </g>
</svg>
